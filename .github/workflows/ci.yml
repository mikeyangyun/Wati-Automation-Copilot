# CI for the Wati Automation Builder Copilot monorepo.
#
# One job (`verify`) runs the exact gate sequence we run locally before
# shipping a phase:
#   typecheck -> lint -> test -> build
# Plus the simulation smoke harness as a final end-to-end sanity check.
#
# Node + pnpm versions follow the project's `packageManager` field and
# `.nvmrc` — keep them in sync if either is bumped.

name: CI

on:
  push:
    branches: ['**']
  pull_request:
    branches: ['**']
  workflow_dispatch:

# Cancel an in-flight run for the same branch / PR when a new commit lands.
concurrency:
  group: ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  verify:
    name: typecheck · lint · test · build
    runs-on: ubuntu-latest
    timeout-minutes: 15

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 11.1.2

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Typecheck
        run: pnpm typecheck

      - name: Lint
        run: pnpm lint

      - name: Test
        run: pnpm test

      - name: Build
        run: pnpm build

      - name: Simulation smoke
        # Deterministic in-process harness — no LLM, no network, no env
        # vars beyond NODE_ENV=test. Acts as a final E2E sanity check.
        run: pnpm --filter server simulation-smoke
        env:
          NODE_ENV: test
